substitutions:
  device_name: rf-fan-gateway
  friendly_name: Passerelle ventilateur RF
  # Fréquence RF de la télécommande (MHz). Commencer à 433.92 et ajuster si
  # le sniff ne capte rien (essayer 433.42, 434.42...).
  cc1101_frequency: "433.92"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - lambda: id(mycc1101).recv();

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Composant RadioLib CC1101 (requis pour les modules CC1101 8 broches)
external_components:
  - source: github://juanboro/esphome-radiolib-cc1101@main
    components: [ radiolib_cc1101 ]

logger:

api:
  encryption:
    key: !secret rf_fan_api_key
  services:
    - service: transmit_rf_fan
      variables:
        action: string
        code: string
        repeat_count: int
      then:
        - remote_transmitter.transmit_rc_switch_raw:
            transmitter_id: rf_transmitter
            code: !lambda "return code;"
            protocol: 1
            repeat:
              times: !lambda "return repeat_count;"
              wait_time: 10ms

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret rf_fan_fallback_password

captive_portal:

web_server:
  port: 80

# SPI standard ESP32 (VSPI)
spi:
  id: spi_bus
  type: single
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# CC1101 câblage module bleu (standard 8 broches)
# Pin 1 VCC→3V3 | Pin 2 GND→GND | Pin 3 MOSI→D23 | Pin 4 SCLK→D18
# Pin 5 MISO→D19 | Pin 6 GDO2→(non utilisé) | Pin 7 GDO0→D4 | Pin 8 CSN→D5
radiolib_cc1101:
  id: mycc1101
  cs_pin: 5
  rx_pin:
    number: 4
    allow_other_uses: true
  frequency: ${cc1101_frequency}
  filter: 464kHz
  bitrate: 5

# Émetteur RF sur GDO0 (GPIO4) — bascule le CC1101 en TX puis revient en RX
remote_transmitter:
  - id: rf_transmitter
    pin:
      number: 4
      allow_other_uses: true
    carrier_duty_percent: 100%
    non_blocking: false
    on_transmit:
      then:
        - lambda: id(mycc1101).xmit();
    on_complete:
      then:
        - lambda: id(mycc1101).recv();

# Récepteur RF sur GDO0 (GPIO4) — sniff et publie vers Home Assistant
remote_receiver:
  - id: rf_receiver
    pin:
      number: 4
      allow_other_uses: true
    tolerance: 50%
    filter: 100us
    idle: 4ms
    dump: []
    on_rc_switch:
      then:
        - if:
            condition:
              api.connected:
            then:
              - homeassistant.event:
                  event: esphome.rf_fan_received
                  data_template:
                    device: ${device_name}
                    action: "sniff"
                    code: "{{ rc_code }}"
                  variables:
                    rc_code: !lambda "return x.code;"
