version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # pytest is pinned transitively by pytest-homeassistant-custom-component;
      # bumping it independently creates an unresolvable dependency conflict.
      - dependency-name: pytest
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
